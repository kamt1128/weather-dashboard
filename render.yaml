databases:
  - name: weather-db
    databaseName: weather
    user: weather
    plan: free
    postgresMajorVersion: 16
    ipAllowList: []

caches:
  - name: weather-redis
    plan: free
    ipAllowList: []

services:
  - type: web
    name: weather-backend
    runtime: python
    pythonVersion: 3.12.5
    plan: free
    buildCommand: pip install -r backend/requirements.txt && cd backend && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: cd backend && daphne -b 0.0.0.0 -p $PORT config.asgi:application
    healthCheckPath: /api/v1/health/
    healthCheckTTL: 300
    autoDeploy: true
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: weather-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: weather-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: weather-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: weather-redis
          type: redis
          property: connectionString
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.5"

  - type: background_worker
    name: weather-celery-worker
    runtime: python
    pythonVersion: 3.12.5
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && celery -A config worker -l info
    autoDeploy: true
    envVars:
      - key: DJANGO_SECRET_KEY
        fromService:
          name: weather-backend
          envVarKey: DJANGO_SECRET_KEY
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: weather-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: weather-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: weather-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: weather-redis
          type: redis
          property: connectionString
      - key: OPENWEATHER_API_KEY
        sync: false

  - type: background_worker
    name: weather-celery-beat
    runtime: python
    pythonVersion: 3.12.5
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    autoDeploy: true
    envVars:
      - key: DJANGO_SECRET_KEY
        fromService:
          name: weather-backend
          envVarKey: DJANGO_SECRET_KEY
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: weather-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: weather-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: weather-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: weather-redis
          type: redis
          property: connectionString
