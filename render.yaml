# Render Blueprint — Weather Real-Time Dashboard
# Provisiona Postgres + Redis + web service Daphne + 2 workers Celery (worker y beat).
# Conecta este repo a Render -> New -> Blueprint, Render detecta este archivo automaticamente.

databases:
  - name: weather-db
    databaseName: weather
    user: weather
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  # Redis (cache + Celery broker + Channels layer)
  - type: redis
    name: weather-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # Web service: Django + DRF + Channels (Daphne ASGI)
  - type: web
    name: weather-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt && cd backend && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: cd backend && daphne -b 0.0.0.0 -p $PORT config.asgi:application
    healthCheckPath: /api/v1/health/
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: weather-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: weather-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: weather-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: weather-redis
          property: connectionString
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  # Celery worker (consume tasks)
  - type: worker
    name: weather-celery-worker
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && celery -A config worker -l info
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: weather-backend
          envVarKey: DJANGO_SECRET_KEY
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: weather-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: weather-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: weather-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: weather-redis
          property: connectionString
      - key: OPENWEATHER_API_KEY
        sync: false

  # Celery beat (scheduler periodic tasks)
  - type: worker
    name: weather-celery-beat
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: weather-backend
          envVarKey: DJANGO_SECRET_KEY
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: weather-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: weather-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: weather-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: weather-redis
          property: connectionString
