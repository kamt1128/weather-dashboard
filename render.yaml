# Render Blueprint — Weather Real-Time Dashboard
# Provisiona Postgres + Redis + web service Daphne (todo en plan free).
#
# Nota sobre Celery (worker + beat):
# Render free tier NO soporta `type: worker`. La implementacion de Celery esta
# en el repo (backend/weather/tasks.py, backend/config/celery.py) y funciona en
# docker-compose local. Para deploy en produccion, hay tres opciones:
#   1. Upgrade a Render Standard ($7/mes por worker x 2).
#   2. Deploy de los workers en Railway (free tier soporta workers).
#   3. Cron externo (GitHub Actions schedule) que hace POST a un endpoint
#      protegido del backend para disparar el refresh periodico.
# Por defecto el blueprint NO los provisiona — la app funciona sin ellos
# gracias al cache Redis 600s + fetch on-demand a OpenWeather.

databases:
  - name: weather-db
    databaseName: weather
    user: weather
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  # Redis (cache + Channels layer + Celery broker para uso local/upgrade)
  - type: redis
    name: weather-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # Web service: Django + DRF + Channels (Daphne ASGI)
  - type: web
    name: weather-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt && cd backend && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: cd backend && daphne -b 0.0.0.0 -p $PORT config.asgi:application
    healthCheckPath: /api/v1/health/
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: weather-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: weather-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: weather-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: weather-redis
          property: connectionString
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
